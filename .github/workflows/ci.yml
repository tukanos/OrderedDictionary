name: smalltalkCI

on: 
  push:
  pull_request:
    branches:
      master
  schedule:
    - cron: "15 2 9 * *" #run job on the 9th day of every month on the 15th minute of the 2nd hour

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest ]
        smalltalk: [ GemStone64-3.6.8, GemStone64-3.7.2, GemStone64-3.7.4.3, GemStone64-3.7.5 ]
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.smalltalk }}
    steps:
      - uses: actions/checkout@v2
      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ matrix.smalltalk }}
      - name: Run tests
        run: smalltalkci -s ${{ matrix.smalltalk }}
        shell: bash
        timeout-minutes: 20
